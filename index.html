<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./weather.css">
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="weather-app p-4 text-center">

    <h3 class="mb-3">🌤 Weather App</h3>

    <div class="input-group mb-4">
      <input type="text" id="cityInput" class="form-control" placeholder="Search city...">
      <button class="btn btn-warning" onclick="getWeather()">🔍</button>
    </div>

    <div id="mainWeather" class="d-none">
      <h4 id="cityName"></h4>
      <img id="icon" src="" alt="weather icon">
      <h1 id="temp"></h1>
      <p id="desc" class="text-capitalize"></p>
      <p id="feelsLike"></p>
    </div>

    <div id="extraInfo" class="row mt-4 g-3 d-none">

      <div class="col-6">
        <div class="info-box">
          <h6>💧 Humidity</h6>
          <p id="humidity"></p>
        </div>
      </div>

      <div class="col-6">
        <div class="info-box">
          <h6>💨 Wind</h6>
          <p id="wind"></p>
        </div>
      </div>

    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
